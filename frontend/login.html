<!DOCTYPE html>

<html>

<head>

<title>Login Page</title>

<!-- Google Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS -->

<link rel="stylesheet" href="style/style.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="nav">
<img src="image/logo_.png" alt="logo" class="logo">
</div>

<!-- ================= LOGIN CARD ================= -->

<div class="card">

<form id="loginForm">

<h2>Login</h2>

<!-- EMAIL FIELD -->

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter email"
autocomplete="off"
required>

<span class="input-error" id="email-error"></span>

</div>

<!-- PASSWORD FIELD -->

<div class="input-group">

<label>Password</label>

<div class="password-wrapper">

<input
type="password"
id="password"
name="password"
placeholder="Enter password"
autocomplete="current-password"
required>

<span class="toggle-password" onclick="togglePassword()">👁</span>

</div>

<span class="input-error" id="password-error"></span>

</div>

<!-- LOGIN BUTTON -->

<input type="submit" value="Login" class="btn">

<!-- SOCIAL LOGIN -->

<p class="divider">or login with</p>

<div class="social-login">

<a href="#" class="social-btn">
<img src="image/google.png" alt="Google">
</a>

<a href="#" class="social-btn">
<img src="image/github.png" alt="GitHub">
</a>

</div>

<!-- REGISTER LINK -->

<p class="login-link">
Don't have account?
<a href="register.html">Register</a>
</p>

</form>

</div>

<!-- ================= FOOTER ================= -->

<footer>
&copy;2026 All rights reserved!
</footer>

<!-- ================= VALIDATION SCRIPT ================= -->

<script src="script/script.js"></script>

<!-- ================= LOGIN API SCRIPT ================= -->

<script>

/*
LOGIN FLOW

1. User clicks login
2. Prevent page reload
3. Send email + password to Spring Boot
4. Backend verifies credentials
5. Backend returns user data
6. Redirect to correct dashboard
*/

document.addEventListener("DOMContentLoaded", function(){

const form = document.getElementById("loginForm");

form.addEventListener("submit", function(e){

e.preventDefault();

const loginData = {

email: document.getElementById("email").value,
password: document.getElementById("password").value

};

fetch("http://localhost:8080/api/login", {

method: "POST",

headers: {
"Content-Type": "application/json"
},

body: JSON.stringify(loginData)

})

.then(response => response.json())

.then(data => {

console.log("Server response:", data);


// CHECK IF LOGIN FAILED

if(data.error){

alert(data.error);
return;

}


// STORE USER DATA

localStorage.setItem(
"userName",
data.firstName + " " + data.lastName
);

localStorage.setItem("role", data.role);

localStorage.setItem("userEmail", loginData.email);

// REDIRECT BASED ON ROLE

if(data.role.toLowerCase() === "student"){

window.location.href = "student-home.html";

}

else if(data.role.toLowerCase() === "mentor"){

window.location.href = "mentor-home.html";

}

})

.catch(error => {

console.error("Login error:", error);

});

});

});

</script>

</body>
</html>
